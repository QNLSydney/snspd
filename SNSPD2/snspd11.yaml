### DEVICE 1 ###
device_line_1:
  name: 'R9C9'
  currents: [ 0.000e+00, -2.500e-07, -5.000e-07, -7.500e-07, -1.000e-06,
       -1.250e-06, -1.500e-06, -1.750e-06, -2.000e-06, -2.250e-06,
       -2.500e-06, -2.750e-06, -3.000e-06, -3.250e-06, -3.500e-06,
       -3.750e-06, -4.000e-06, -4.250e-06, -4.500e-06, -4.750e-06,
       -5.000e-06, -5.250e-06, -5.500e-06, -5.750e-06, -6.000e-06,
       -6.250e-06, -6.500e-06, -6.750e-06, -7.000e-06, -7.250e-06,
       -7.500e-06, -7.750e-06, -8.000e-06, -8.250e-06, -8.500e-06,
       -8.750e-06, -9.000e-06, -9.250e-06, -9.500e-06, -9.750e-06,
       -1.000e-05, -1.025e-05, -1.050e-05, -1.075e-05, -1.100e-05,
       -1.125e-05, -1.150e-05, -1.175e-05, -1.200e-05, -1.225e-05,
       -1.250e-05, -1.275e-05, -1.300e-05, -1.325e-05, -1.350e-05,
       -1.375e-05, -1.400e-05, -1.425e-05, -1.450e-05, -1.475e-05,
       -1.500e-05] # from ID 41
  v_attenuator_vals:
    att_blue_v_1: 5
    att_blue_v_2: 5.5
  bias_current: -14e-6 # max SDE current 
  thresholds:
    # ranges must go from high to low current, assumes the loop goes high to low
    # thresholds are in volts 
    # currents are in amps 
    # the current is the lower bound of the range 
    range1: 
      current: -13e-6
      threshold1: 342e-3
      threshold2: 120e-3 # lower range getting close to noise floor 
    range2: 
      current: -8e-6
      threshold1: 198e-3
      threshold2: 60e-3
    range3:
      current: 0
      threshold1: 78e-3
      threshold2: 48e-3
  IDs: 
    critical_current: 41
    dark_counts: 82
    light_counts: 80
    counts_vs_attenuation:
      run1: 87 # Bias current -14uA
      run2: [100, 101, 102, 103, 104, 105, 106, 107] # Range of bias currents 
      run3: [110, 111, 112, 113]
    wavelength: 124 
      

    # lower threshold well above the noise floor at all points, set thresholds by sweeping current and observing 
    # that search numbers were the same 

